[project]
name = "stock-agent-orchestrator"
environment = "beta"
mode = "active"

[roles]
owner = "xiaoc-beta"
data = "xiaozhi-beta"
analyst = "xiaoba-beta"

[automation]
auto_advance_within_rules = true
allow_real_trading = false
require_user_review_for_new_rules = true

[paths]
candidate_list = "/path/to/candidate_list.md"
seven_layer_reports = "/path/to/seven_layer_reports"
entry_monitor_reports = "/path/to/entry_monitor_reports"
sqlite_db = "./runtime/beta-live.db"

[feishu]
group_chat_id = "replace-me"
owner_open_id = "replace-me"
data_open_id = "replace-me"
analyst_open_id = "replace-me"
send_mode = "live"
api_base_url = "https://open.feishu.cn"
app_id = "replace-me"
app_secret = "replace-me"
send_allowlist = ["replace-me"]
verification_token = "replace-me"
encrypt_key = "replace-me"
webhook_rate_limit_per_minute = 60
